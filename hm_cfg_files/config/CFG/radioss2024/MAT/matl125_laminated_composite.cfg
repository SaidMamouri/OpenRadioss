//file format
FORMAT(radioss2024) 
{
    ASSIGN(IO_FLAG, 0, EXPORT);
    ASSIGN(IO_FLAG, 1, IMPORT);
    if(IO_FLAG == 1)
    {
        HEADER("/MAT/%3s",LAW_NO);
        if(LAW_NO == "LAW" )
        {
            ASSIGN(Mat_Name_OR_LawNo,2);
        }
    }
    else if(IO_FLAG == 0 && Mat_Name_OR_LawNo == 2)
    {
        HEADER("/MAT/LAW125/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    else
    {
        HEADER("/MAT/LAMINATED_COMPOSITE/%d",_ID_);
        CARD("%-100s", TITLE);
    }    
    COMMENT("#        Init. dens.");
    CARD("%20lg",MAT_RHO);
    COMMENT("#                 E1                  E2                  E3      SOFT      FS ");
    CARD("%20lg%20lg%20lg%20lg%10d",MAT_E1,MAT_E2,MAT_E3,MAT_SOFT,MAT_FS);
    COMMENT("#                G12                G13                G23");
    CARD("%20lg%20lg%20lg",MAT_G12,MAT_G13,MAT_G23);
      COMMENT("#                Nu12                Nu13                Nu23");
    CARD("%20lg%20lg%20lg",MAT_NU12,MAT_NU13,MAT_NU23);
    
    COMMENT("#         LCE11T                 E11T      LCXT                  XT              SLIMT1");
    CARD("%10d%20lg%10d%20lg%20lg",IFUNC_LEM11T,MAT_EM11T,IFUNC_LCXT,MAT_XT,MAT_SLIMT1);
    COMMENT("#         LCE11C                 E11C      LCXC                  XC              SLIMC1");
    CARD("%10d%20lg%10d%20lg%20lg",IFUNC_LEM11C,MAT_EM11C,IFUNC_LCXC,MAT_XC,MAT_SLIMC1);

       
    COMMENT("#         LCE22T                 E22T      LCYT                 YT              SLIMT2");
    CARD("%10d%20lg%10d%20lg%20lg",IFUNC_LEM22T,MAT_EM22T,IFUNC_LCYT,MAT_YT,MAT_SLIMT2);
    COMMENT("#         LCE11C                 E22C      LCYC                  XYC              SLIMC2");
    CARD("%10d%20lg%10d%20lg%20lg",IFUNC_LEM22C,MAT_EM22C,IFUNC_LCYC,MAT_YC,MAT_SLIMC2);
    
    COMMENT("#         LCE33T                 EM33T      LCZT                 ZT              SLIMT3");
    CARD("%10d%20lg%10d%20lg%20lg",IFUNC_LEM33T,MAT_EM33T,IFUNC_LCZT,MAT_ZT,MAT_SLIMT3);
    COMMENT("#         LCE33C                 E33C      LCZC                  ZC             SLIMC3");
    CARD("%10d%20lg%10d%20lg%20lg",IFUNC_LEM33C,MAT_EM33C,IFUNC_LCZC,MAT_ZC,MAT_SLIMC3);

    COMMENT("#         gamma                tau         EMS                  SC             SLIMS");
    CARD("%20lg%20lg%20lg%20lg%20lg",MAT_GAMMA,MAT_TAU,MAT_EMS,MAT_SC,MAT_SLIMS);
    COMMENT("#         LCGAMMA            LCTAU         LCEMS                LCSC ");
    CARD("%10d%10d%10d%10d",IFUNC_LCGAMMA,IFUNC_LCTAU,IFUNC_LEMS,IFUNC_LCS);

    COMMENT("#         gamma2                tau2         EMS13                  SC13             SLIMS31");
    CARD("%20lg%20lg%20lg%20lg%20lg",MAT_GAMMA2,MAT_TAU2,MAT_EMS13,MAT_SC13,MAT_SLIMS13);
    COMMENT("#         LCGAMMA2            LCTAU2         LCEMS13                LCSC13 ");
    CARD("%10d%10d%10d%10d",IFUNC_LCGAMMA2,IFUNC_LCTAU2,IFUNC_LEMS13,IFUNC_LCS13);
   
    COMMENT("#         gamma3                tau3         EMS23                  SC23             SLIMS23");
    CARD("%20lg%20lg%20lg%20lg%20lg",MAT_GAMMA3,MAT_TAU3,MAT_EMS23,MAT_SC23,MAT_SLIMS23);
    COMMENT("#         LCGAMMA3            LCTAU3         LCEMS23                LCSC23 ");
    CARD("%10d%10d%10d%10d",IFUNC_LCGAMMA3,IFUNC_LCTAU3,IFUNC_LEMS23,IFUNC_LCS23);
    
    COMMENT("#         EPSF               EPSR         TSMD         ");
    CARD("%20lg%20lg%20lg",MAT_EPSF,MAT_EPSR,MAT_TSMD);

    COMMENT("#        LCERODS               ERODS         TSIZE         ");
    CARD("%10d%20lg%20lg", IFUNC_ERODS,MAT_ERODS,MAT_TSIZE);

    COMMENT("#               FCUT");
    CARD("%20lg",FCUT);
    //
    if(Heat_Inp_opt!=0)
    {
        SUBOBJECTS(SUBGRP_HEAT_MAT,/SUBOBJECT/HEAT);
    } 
    if(Heat_Inp_opt!=0 && THERM_STRESS !=0)
    {
        SUBOBJECTS(SUBGRP_THERM_STRESS,/SUBOBJECT/THERM_STRESS);
    }
}
